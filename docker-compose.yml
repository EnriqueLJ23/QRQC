services:
  app:
    build: .
    image: qrqc:latest
    restart: unless-stopped
    environment:
      # Portainer expone estas vars al proceso de `docker compose` para sustitución
      # ${VAR}, sin necesitar un archivo .env físico en /data/compose/<id>/.
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI}
      - MAIL_SENDER=${MAIL_SENDER}
      - BASE_URL=${BASE_URL}
      - PORT=${PORT:-3000}
    ports:
      # host:contenedor — Nginx Proxy Manager (otra VM) apunta a <ip-de-este-host>:${APP_PORT:-3000}
      - "${APP_PORT:-3000}:3000"
    extra_hosts:
      # Permite usar host.docker.internal en DATABASE_URL si Postgres corre en este mismo host Docker
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
